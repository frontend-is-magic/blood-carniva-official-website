name: Vercel CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Select Vercel environment
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "VERCEL_ENV=production" >> "$GITHUB_ENV"
            echo "VERCEL_PROD_FLAG=--prod" >> "$GITHUB_ENV"
          else
            echo "VERCEL_ENV=preview" >> "$GITHUB_ENV"
            echo "VERCEL_PROD_FLAG=" >> "$GITHUB_ENV"
          fi

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment="$VERCEL_ENV" --token="$VERCEL_TOKEN"

      - name: Build with Vercel
        run: vercel build $VERCEL_PROD_FLAG --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt output
        run: vercel deploy --prebuilt $VERCEL_PROD_FLAG --token="$VERCEL_TOKEN"
